name: Python Test

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: 依存関係をインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r requ
